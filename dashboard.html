<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Softener · 4 separate sensor graphs</title>
  <!-- Firebase & Chart.js -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #dce6f0;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .dashboard {
      max-width: 1400px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #1d3247;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    h1 small {
      font-size: 16px;
      font-weight: 400;
      color: #3a5a78;
      margin-left: 8px;
    }
    .badge {
      background: #1d3650;
      padding: 6px 22px;
      border-radius: 60px;
      color: #b5d6f2;
      font-size: 14px;
      border: 1px solid #4f7b9e;
      margin-left: auto;
    }
    .badge.live { background: #1e6b4a; border-color: #42bb83; color: #b8f0d0; animation: pulseLive 2s infinite; }
    @keyframes pulseLive { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

    .grid-4 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 32px;
      padding: 20px 18px 18px 18px;
      box-shadow: 0 12px 28px rgba(0,10,25,0.15);
      border: 1px solid #c8d8e8;
      transition: 0.2s;
    }
    .card h3 {
      font-size: 18px;
      color: #1d3247;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h3 span { font-weight: 400; font-size: 14px; color: #4a6a8a; margin-left: auto; }
    .chart-container { position: relative; height: 190px; width: 100%; }
    .stat-row {
      display: flex;
      gap: 12px;
      margin: 8px 0 2px 0;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: #ecf3fa;
      border-radius: 40px;
      padding: 4px 18px;
      font-size: 14px;
      color: #1d3247;
      border: 1px solid #c8d8e8;
    }
    .stat-pill strong { font-weight: 600; }

    .status-footer {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #3a5a78;
      font-size: 14px;
      border-top: 1px solid #cddcec;
      padding-top: 16px;
      flex-wrap: wrap;
    }
    .status-footer .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot.green { background: #3a9a7a; }
    .dot.yellow { background: #c8a83a; }
    .dot.red { background: #c84a4a; }
    .dot.gray { background: #8a9aaa; }

    .control-bar {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }
    .control-bar button {
      padding: 10px 28px;
      border-radius: 60px;
      border: 2px solid #3b6485;
      background: #203b54;
      color: #b2cfec;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
    }
    .control-bar button:hover { transform: scale(1.02); background: #2a4a6a; }
    .control-bar button.active { background: #1e7e56; border-color: #42bb83; color: white; box-shadow: 0 0 20px #2ea06a; }
    .control-bar .clear-btn { background: #4a2a2a; border-color: #8a4a4a; color: #f5b0b0; }
    .control-bar .clear-btn:hover { background: #5a3a3a; }

    @media (max-width: 860px) { .grid-4 { grid-template-columns: 1fr; } }
    @media (max-width: 500px) { .card { padding: 14px; } .chart-container { height: 160px; } }
  </style>
</head>
<body>
<div class="dashboard">
  <h1>
    📊 4‑Sensor Graphs · Softener
    <small>separate views</small>
    <span class="badge live" id="liveBadge">● LIVE</span>
  </h1>

  <div class="control-bar">
    <button id="pauseBtn">⏸ Pause updates</button>
    <button id="resumeBtn" class="active">▶ Resume</button>
    <button id="clearBtn" class="clear-btn">🗑 Clear history</button>
    <span style="margin-left: auto; font-size: 14px; color: #3a5a78;" id="updateCount">updates: 0</span>
  </div>

  <div class="grid-4">
    <!-- Pressure -->
    <div class="card">
      <h3>⏲️ Pressure <span id="pressureLive">2.50 bar</span></h3>
      <div class="chart-container"><canvas id="pressureChart"></canvas></div>
      <div class="stat-row">
        <span class="stat-pill">Now <strong id="pStat">2.50</strong> bar</span>
        <span class="stat-pill" id="pressureStatus">✅ NORMAL</span>
      </div>
    </div>

    <!-- TDS -->
    <div class="card">
      <h3>⚗️ TDS <span id="tdsLive">150 ppm</span></h3>
      <div class="chart-container"><canvas id="tdsChart"></canvas></div>
      <div class="stat-row">
        <span class="stat-pill">Now <strong id="tdsStat">150</strong> ppm</span>
        <span class="stat-pill" id="tdsStatus">✅ GOOD</span>
      </div>
    </div>

    <!-- Salt -->
    <div class="card">
      <h3>🧂 Salt <span id="saltLive">75%</span></h3>
      <div class="chart-container"><canvas id="saltChart"></canvas></div>
      <div class="stat-row">
        <span class="stat-pill">Now <strong id="saltStat">75</strong> %</span>
        <span class="stat-pill" id="saltStatus">✅ OK</span>
      </div>
    </div>

    <!-- Flow -->
    <div class="card">
      <h3>💧 Flow <span id="flowLive">5.0 L/min</span></h3>
      <div class="chart-container"><canvas id="flowChart"></canvas></div>
      <div class="stat-row">
        <span class="stat-pill">Now <strong id="flowStat">5.0</strong> L/min</span>
        <span class="stat-pill" id="flowStatusLabel">💧 FLOWING</span>
      </div>
    </div>
  </div>

  <div class="status-footer">
    <span><span class="dot green" id="statusDot"></span> <span id="footerState">NORMAL</span> &nbsp;·&nbsp; Firebase: <span id="firebaseStatusGraph">✓ connected</span></span>
    <span id="lastUpdateTime">⏱ waiting for data…</span>
  </div>
</div>

<script>
  // ========== FIREBASE ==========
  const firebaseConfig = {
    apiKey: "AIzaSyAUmszBpqnVaftWt_807NDGOXQJSY6ErvA",
    authDomain: "ecowell-iot-project.firebaseapp.com",
    databaseURL: "https://ecowell-iot-project-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ecowell-iot-project",
    storageBucket: "ecowell-iot-project.firebasestorage.app",
    messagingSenderId: "14292512544",
    appId: "1:14292512544:web:d2279da621b8e5ec6ef145"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const DEVICE_ID = "softener-01";
  const deviceRef = db.ref(`devices/${DEVICE_ID}`);
  const historyRef = deviceRef.child("history");

  // ========== DOM ==========
  const liveBadge = document.getElementById('liveBadge');
  const updateCountEl = document.getElementById('updateCount');
  const footerState = document.getElementById('footerState');
  const statusDot = document.getElementById('statusDot');
  const firebaseStatusGraph = document.getElementById('firebaseStatusGraph');
  const lastUpdateTime = document.getElementById('lastUpdateTime');
  const pauseBtn = document.getElementById('pauseBtn');
  const resumeBtn = document.getElementById('resumeBtn');
  const clearBtn = document.getElementById('clearBtn');

  const pressureLive = document.getElementById('pressureLive');
  const tdsLive = document.getElementById('tdsLive');
  const saltLive = document.getElementById('saltLive');
  const flowLive = document.getElementById('flowLive');

  const pStat = document.getElementById('pStat');
  const tdsStat = document.getElementById('tdsStat');
  const saltStat = document.getElementById('saltStat');
  const flowStat = document.getElementById('flowStat');

  const pressureStatus = document.getElementById('pressureStatus');
  const tdsStatus = document.getElementById('tdsStatus');
  const saltStatus = document.getElementById('saltStatus');
  const flowStatusLabel = document.getElementById('flowStatusLabel');

  // ========== CHART INSTANCES (4 separate) ==========
  const commonOpts = (label, color, unit) => ({
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: (ctx) => `${ctx.parsed.y} ${unit}` } }
    },
    scales: {
      y: { beginAtZero: true, grid: { color: '#e8eef4' }, ticks: { font: { size: 9 } } },
      x: { grid: { display: false }, ticks: { maxTicksLimit: 6, font: { size: 8 } } }
    }
  });

  // 1. Pressure
  const ctxP = document.getElementById('pressureChart').getContext('2d');
  const pressureChart = new Chart(ctxP, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Pressure', data: [], borderColor: '#2a7aaa', backgroundColor: 'rgba(42,122,170,0.08)', tension: 0.2, pointRadius: 2 }] },
    options: commonOpts('Pressure', '#2a7aaa', 'bar')
  });

  // 2. TDS
  const ctxT = document.getElementById('tdsChart').getContext('2d');
  const tdsChart = new Chart(ctxT, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'TDS', data: [], borderColor: '#c07a3a', backgroundColor: 'rgba(192,122,58,0.08)', tension: 0.2, pointRadius: 2 }] },
    options: commonOpts('TDS', '#c07a3a', 'ppm')
  });

  // 3. Salt
  const ctxS = document.getElementById('saltChart').getContext('2d');
  const saltChart = new Chart(ctxS, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Salt', data: [], borderColor: '#7a7aaa', backgroundColor: 'rgba(122,122,170,0.08)', tension: 0.2, pointRadius: 2 }] },
    options: commonOpts('Salt', '#7a7aaa', '%')
  });

  // 4. Flow
  const ctxF = document.getElementById('flowChart').getContext('2d');
  const flowChart = new Chart(ctxF, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Flow', data: [], borderColor: '#3a9a8a', backgroundColor: 'rgba(58,154,138,0.08)', tension: 0.2, pointRadius: 2 }] },
    options: commonOpts('Flow', '#3a9a8a', 'L/min')
  });

  // ========== DATA STORE ==========
  let historyData = []; // array of { ts, flow, pressure, tds, salt }
  let updateCounter = 0;
  let isPaused = false;
  let maxPoints = 60;

  // ========== HELPERS ==========
  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function updateStats(sensor) {
    if (!sensor) return;
    const p = sensor.pressure ?? 0;
    const t = sensor.tds ?? 0;
    const s = sensor.salt ?? 0;
    const f = sensor.flow ?? 0;

    pStat.textContent = p.toFixed(2);
    tdsStat.textContent = Math.round(t);
    saltStat.textContent = Math.round(s);
    flowStat.textContent = f.toFixed(1);

    pressureLive.textContent = `${p.toFixed(2)} bar`;
    tdsLive.textContent = `${Math.round(t)} ppm`;
    saltLive.textContent = `${Math.round(s)}%`;
    flowLive.textContent = `${f.toFixed(1)} L/min`;

    // statuses
    if (p < 0.5) { pressureStatus.textContent = '🚨 CRITICAL'; pressureStatus.style.color = '#c84a4a'; }
    else if (p < 1.5) { pressureStatus.textContent = '⚠️ LOW'; pressureStatus.style.color = '#c8a83a'; }
    else { pressureStatus.textContent = '✅ NORMAL'; pressureStatus.style.color = '#3a9a7a'; }

    if (t > 600) { tdsStatus.textContent = '🚨 CRITICAL'; tdsStatus.style.color = '#c84a4a'; }
    else if (t > 350) { tdsStatus.textContent = '⚠️ ELEVATED'; tdsStatus.style.color = '#c8a83a'; }
    else { tdsStatus.textContent = '✅ GOOD'; tdsStatus.style.color = '#3a9a7a'; }

    if (s < 15) { saltStatus.textContent = '🚨 CRITICAL'; saltStatus.style.color = '#c84a4a'; }
    else if (s < 25) { saltStatus.textContent = '⚠️ LOW'; saltStatus.style.color = '#c8a83a'; }
    else { saltStatus.textContent = '✅ OK'; saltStatus.style.color = '#3a9a7a'; }

    if (f < 0.1) { flowStatusLabel.textContent = '⛔ STALLED'; flowStatusLabel.style.color = '#c84a4a'; }
    else if (f < 3) { flowStatusLabel.textContent = '💧 TRICKLE'; flowStatusLabel.style.color = '#c8a83a'; }
    else if (f < 8) { flowStatusLabel.textContent = '💧 FLOWING'; flowStatusLabel.style.color = '#3a9a7a'; }
    else { flowStatusLabel.textContent = '💧 HIGH FLOW'; flowStatusLabel.style.color = '#2a7aaa'; }
  }

  function updateFooter(state, ts) {
    if (state === 'normal' || state === 'NORMAL') {
      footerState.textContent = '✅ NORMAL';
      statusDot.className = 'dot green';
    } else if (state === 'warning' || state === 'WARNING') {
      footerState.textContent = '⚠️ WARNING';
      statusDot.className = 'dot yellow';
    } else if (state === 'critical' || state === 'CRITICAL' || state === 'FAULT') {
      footerState.textContent = '🚨 CRITICAL';
      statusDot.className = 'dot red';
    } else {
      footerState.textContent = '⏻ IDLE';
      statusDot.className = 'dot gray';
    }
    if (ts) lastUpdateTime.textContent = `⏱ ${formatTime(ts)}`;
  }

  // ========== PUSH DATA TO CHARTS ==========
  function pushDataPoint(sensor, ts) {
    if (isPaused) return;
    const p = sensor.pressure ?? 0;
    const t = sensor.tds ?? 0;
    const s = sensor.salt ?? 0;
    const f = sensor.flow ?? 0;
    const label = formatTime(ts);

    historyData.push({ ts, flow: f, pressure: p, tds: t, salt: s });
    if (historyData.length > maxPoints) historyData.shift();

    const labels = historyData.map(d => formatTime(d.ts));

    // Update each chart separately
    pressureChart.data.labels = labels;
    pressureChart.data.datasets[0].data = historyData.map(d => d.pressure);
    pressureChart.update('none');

    tdsChart.data.labels = labels;
    tdsChart.data.datasets[0].data = historyData.map(d => d.tds);
    tdsChart.update('none');

    saltChart.data.labels = labels;
    saltChart.data.datasets[0].data = historyData.map(d => d.salt);
    saltChart.update('none');

    flowChart.data.labels = labels;
    flowChart.data.datasets[0].data = historyData.map(d => d.flow);
    flowChart.update('none');

    updateCounter++;
    updateCountEl.textContent = `updates: ${updateCounter}`;
    updateStats(sensor);
  }

  // ========== READ LATEST FROM FIREBASE ==========
  function fetchLatest() {
    deviceRef.once('value').then(snap => {
      const val = snap.val();
      if (!val) return;
      const sensors = val.sensors || {};
      const state = val.stateLevel || 'normal';
      const ts = val.lastUpdated ? new Date(val.lastUpdated).getTime() : Date.now();
      pushDataPoint(sensors, ts);
      updateFooter(state, ts);
      firebaseStatusGraph.textContent = '✓ connected';
      firebaseStatusGraph.style.color = '#3a9a7a';
      liveBadge.className = 'badge live';
    }).catch(err => {
      firebaseStatusGraph.textContent = '✗ error';
      firebaseStatusGraph.style.color = '#c84a4a';
      console.warn('Firebase read error:', err.message);
    });
  }

  // ========== LISTEN FOR REAL-TIME UPDATES ==========
  let listenerRef = null;

  function startRealtimeListener() {
    if (listenerRef) listenerRef.off();
    listenerRef = deviceRef;
    listenerRef.on('value', (snap) => {
      if (isPaused) return;
      const val = snap.val();
      if (!val) return;
      const sensors = val.sensors || {};
      const state = val.stateLevel || 'normal';
      const ts = val.lastUpdated ? new Date(val.lastUpdated).getTime() : Date.now();
      pushDataPoint(sensors, ts);
      updateFooter(state, ts);
      firebaseStatusGraph.textContent = '✓ live';
      firebaseStatusGraph.style.color = '#3a9a7a';
      liveBadge.className = 'badge live';
    }, (err) => {
      firebaseStatusGraph.textContent = '✗ listener error';
      firebaseStatusGraph.style.color = '#c84a4a';
      console.warn('Listener error:', err.message);
    });
  }

  // ========== LOAD HISTORY (last 60) ==========
  function loadHistory() {
    historyRef.orderByKey().limitToLast(maxPoints).once('value').then(snap => {
      const items = [];
      snap.forEach(child => {
        const val = child.val();
        if (val && val.sensors) {
          items.push({
            ts: val.ts || Date.now(),
            flow: val.sensors.flow || 0,
            pressure: val.sensors.pressure || 0,
            tds: val.sensors.tds || 0,
            salt: val.sensors.salt || 0
          });
        }
      });
      if (items.length > 0) {
        historyData = items;
        historyData.sort((a,b) => a.ts - b.ts);
        const labels = historyData.map(d => formatTime(d.ts));
        pressureChart.data.labels = labels;
        pressureChart.data.datasets[0].data = historyData.map(d => d.pressure);
        pressureChart.update('none');

        tdsChart.data.labels = labels;
        tdsChart.data.datasets[0].data = historyData.map(d => d.tds);
        tdsChart.update('none');

        saltChart.data.labels = labels;
        saltChart.data.datasets[0].data = historyData.map(d => d.salt);
        saltChart.update('none');

        flowChart.data.labels = labels;
        flowChart.data.datasets[0].data = historyData.map(d => d.flow);
        flowChart.update('none');

        updateCountEl.textContent = `updates: ${historyData.length}`;
        const last = historyData[historyData.length-1];
        if (last) {
          updateStats(last);
          updateFooter('normal', last.ts);
        }
        firebaseStatusGraph.textContent = '✓ history loaded';
        firebaseStatusGraph.style.color = '#3a9a7a';
      } else {
        fetchLatest();
      }
    }).catch(err => {
      console.warn('History load error:', err.message);
      fetchLatest();
    });
  }

  // ========== CONTROLS ==========
  pauseBtn.addEventListener('click', function() {
    isPaused = true;
    pauseBtn.classList.add('active');
    resumeBtn.classList.remove('active');
    liveBadge.className = 'badge';
    liveBadge.textContent = '⏸ PAUSED';
  });

  resumeBtn.addEventListener('click', function() {
    isPaused = false;
    resumeBtn.classList.add('active');
    pauseBtn.classList.remove('active');
    liveBadge.className = 'badge live';
    liveBadge.textContent = '● LIVE';
    fetchLatest();
  });

  clearBtn.addEventListener('click', function() {
    if (confirm('Clear local history and charts?')) {
      historyData = [];
      pressureChart.data.labels = [];
      pressureChart.data.datasets.forEach(d => d.data = []);
      pressureChart.update('none');
      tdsChart.data.labels = [];
      tdsChart.data.datasets.forEach(d => d.data = []);
      tdsChart.update('none');
      saltChart.data.labels = [];
      saltChart.data.datasets.forEach(d => d.data = []);
      saltChart.update('none');
      flowChart.data.labels = [];
      flowChart.data.datasets.forEach(d => d.data = []);
      flowChart.update('none');
      updateCountEl.textContent = 'updates: 0';
    }
  });

  // ========== INIT ==========
  function init() {
    loadHistory();
    setTimeout(() => {
      startRealtimeListener();
    }, 800);
    setInterval(() => {
      if (!isPaused) fetchLatest();
    }, 5000);
  }

  init();

  window.addEventListener('beforeunload', function() {
    if (listenerRef) listenerRef.off();
  });

</script>
</body>
</html>
